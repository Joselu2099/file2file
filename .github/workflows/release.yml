name: Release

on:
  push:
    branches: [ main, master ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Extract version from pom.xml
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not extract project version from pom.xml"
          exit 1
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if tag exists
      id: check_tag
      run: |
        TAG="v${{ steps.get_version.outputs.version }}"
        if [[ "$TAG" == *-SNAPSHOT ]]; then
          echo "Skipping SNAPSHOT version: $TAG"
          echo "tag_exists=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build project
      if: steps.check_tag.outputs.tag_exists == 'false'
      run: mvn -B clean verify -DskipTests

    - name: Prepare release assets
      if: steps.check_tag.outputs.tag_exists == 'false'
      id: prepare_assets
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        JAR_NAME="file2file-v${VERSION}.jar"
        SHADED="target/file2file-${VERSION}.jar"
        if [ ! -f "$SHADED" ]; then
          echo "ERROR: Shaded JAR not found at $SHADED"
          exit 1
        fi
        cp "$SHADED" "target/${JAR_NAME}"
        (cd target && sha256sum "${JAR_NAME}") > "target/${JAR_NAME}.sha256"
        echo "jar_path=target/${JAR_NAME}" >> $GITHUB_OUTPUT
        echo "sha256_path=target/${JAR_NAME}.sha256" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: steps.check_tag.outputs.tag_exists == 'false'
      # softprops/action-gh-release v2.3.2 pinned to commit SHA for supply-chain security
      uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        generate_release_notes: true
        files: |
          ${{ steps.prepare_assets.outputs.jar_path }}
          ${{ steps.prepare_assets.outputs.sha256_path }}
